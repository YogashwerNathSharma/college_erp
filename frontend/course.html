<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,
   initial-scale=1.0">
  <title>Course Dashboard</title>
  <link rel="stylesheet" href="/css/crude.css">
</head>
<body>

<div class="container">

  <!-- LEFT FORM -->
  <div class="form-box">
    <h2>Course Form</h2>

    <input id="cid" placeholder="Course ID (auto)" disabled>
    <input id="cname" placeholder="Course Name">
    <input id="duration" placeholder="Duration">
    <input id="fees" placeholder="Fees">


    <!-- SAME BUTTON CLASSES AS STUDENT -->
    <button class="add" onclick="addCourse()">+ Add Course</button>
    <button class="update" onclick="updateCourse()">↻ Update Course</button>
    <button class="delete" onclick="deleteCourse()">✖ Delete Course</button>
  </div>

  <!-- RIGHT TABLE -->
  <div class="table-box">
    <h2>Course List</h2>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Duration</th>
          <th>Fees</th>
        </tr>
      </thead>
      <tbody id="courseBody"></tbody>
    </table>
  </div>

</div>

<script src="/js/course.js"></script>
</body>
</html>
